<div class="container mt-4">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white pt-4">
            <h3 class="mb-0">Transaction History</h3>
        </div>
        <div class="card-body">
            <div *ngIf="loading" class="text-center py-4">
                <div class="spinner-border text-primary"></div>
            </div>

            <div class="table-responsive" *ngIf="!loading">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>From Account</th>
                            <th>To Account</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let txn of transactions">
                            <td>{{txn.timestamp | date:'medium'}}</td>
                            <td>
                                <span class="badge"
                                    [ngClass]="{'bg-success': txn.type==='DEPOSIT', 'bg-warning text-dark': txn.type==='WITHDRAW', 'bg-primary': txn.type==='TRANSFER'}">
                                    {{txn.type}}
                                </span>
                            </td>
                            <td>{{txn.fromAccount || 'N/A'}}</td>
                            <td>{{txn.toAccount || 'N/A'}}</td>
                            <td class="fw-bold text-end">${{txn.amount | number:'1.2-2'}}</td>
                        </tr>
                        <tr *ngIf="transactions.length === 0">
                            <td colspan="5" class="text-center text-muted">No transactions found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
