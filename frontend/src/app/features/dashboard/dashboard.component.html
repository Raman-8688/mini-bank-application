<div class="container mt-5">
    <div class="p-5 mb-4 bg-white rounded-3 shadow-sm border">
        <div class="container-fluid py-2 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="display-5 fw-bold">Welcome back, {{user?.username}}!</h1>
                <p class="fs-4 text-muted mb-0">Role: {{isAdmin ? 'Administrator' : 'User'}}</p>
            </div>
        </div>
    </div>

    <div *ngIf="!isAdmin" class="row mt-4">
        <div *ngIf="accounts.length === 0" class="col-12 text-center py-5">
            <h4>You don't have any accounts yet.</h4>
            <button class="btn btn-primary mt-3" routerLink="/create-account">Create Account</button>
        </div>

        <div class="col-md-6" *ngFor="let account of accounts">
            <div class="card shadow-sm mb-4 border-primary">
                <div class="card-header bg-primary text-white d-flex justify-content-between">
                    <h5 class="mb-0">Account: {{account.accountNumber}}</h5>
                </div>
                <div class="card-body">
                    <h3 class="card-title mb-1">${{account.balance | number:'1.2-2'}}</h3>
                    <p class="text-muted small">Current Balance</p>
                </div>
            </div>
        </div>
    </div>

    <div *ngIf="isAdmin" class="mt-4 p-4 bg-white shadow-sm rounded border">
        <h3>Admin Control Panel</h3>
        <p>Manage system accounts and monitor transactions here.</p>
    </div>
</div>
